<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mathy — Math Puzzle Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0e1a;
      color: #f0f4f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 24px;
    }

    .container {
      max-width: 520px;
      width: 100%;
      flex: 1;
    }

    .logo {
      font-size: 48px;
      font-weight: 200;
      letter-spacing: -2px;
      color: #f0f4f8;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 16px;
      color: #94a3b8;
      margin-bottom: 40px;
      font-weight: 400;
    }

    .description {
      font-size: 15px;
      line-height: 1.7;
      color: #cbd5e1;
      margin-bottom: 48px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: #475569;
      margin-bottom: 12px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 64px;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #5eead4;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }

    .link:hover {
      background: rgba(94,234,212,0.07);
      border-color: rgba(94,234,212,0.25);
    }

    .link-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    footer {
      max-width: 520px;
      width: 100%;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    footer p {
      font-size: 13px;
      color: #475569;
    }

    footer a {
      color: #94a3b8;
      text-decoration: none;
    }

    footer a:hover {
      color: #f0f4f8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">Mathy</h1>
    <p class="tagline">Math Puzzle for iOS</p>

    <p class="description">
      Build a path through the grid so the result of the operation
      on your selected numbers matches the target. Simple rules,
      satisfying logic.
    </p>

    <p class="section-title">Legal</p>
    <nav class="links">
      <a class="link" href="privacy-policy.html">
        <span class="link-icon">🔒</span>
        Privacy Policy
      </a>
      <a class="link" href="terms-of-service.html">
        <span class="link-icon">📄</span>
        Terms of Service
      </a>
    </nav>
  </div>

  <footer>
    <p>Support &amp; questions</p>
    <p><a href="mailto:alexkostin93@gmail.com">alexkostin93@gmail.com</a></p>
  </footer>
</body>
</html>
